<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/contato.css">
</head>
<body>
    <header>
        <img class="logo-header" src="../img/logo-ford-256.png" alt="Logo da Ford">

        <div class="hamburguer" id="btn-hamburguer">
            ☰
        </div>

        <nav class="navegacao" id="menu-nav">
            <a href="../index.html">Home</a>
            <a href="lancamento.html">Lançamento</a>
            <a href="contato.html">Contato</a>
        </nav>
    </header>
    <main>

        <form action="#">
            
            <div class="container-imagem">
                <img src="../img/xls_2.2_diesel.jpg" alt="XLS 2.2 Diesel 4X4 AT 2022">
            </div>
            <div class="container-contatos">
                <h1>Sobre você</h1>
                <input type="text" placeholder="Digite seu nome">
                <input type="text" placeholder="Digite seu sobrenome">
                <input type="text" placeholder="Digite seu CPF">
                <input type="email" placeholder="Digite seu email">
                <input type="tel" placeholder="Digite seu telefone">
                <select name="opcao">
                    <option value="">Selecione o tipo de contato</option>
                    <option value="1">Elogio</option>
                    <option value="2">Reclamação</option>
                    <option value="3">Solicitação</option>
                </select>
                <div class="btn-formulario">
                <button type="submit">Enviar</button>
                </div>
            </div>
            

        </form>

    </main>
    <footer>
        <div class="logo-redes-sociais">
            <p>Redes Sociais</p>
            <a target="_blank" href="https://www.facebook.com/FordBrasil/?locale=pt_BR">
                <img src="../img/facebook-50.png" alt="Facebook">
            </a>
            <a target="_blank" href="https://www.youtube.com/@fordbrasil/featured">
                <img src="../img/youtube-squared-50.png" alt="Youtube">
            </a>
            <a target="_blank" href="https://www.instagram.com/fordbrasil/">
                <img src="../img/instagram-logo-50.png" alt="Instagram">
            </a>
        </div>

        <p class="copyright">© 2022 Ford Motor Company - Todos os direitos reservados</p>

        <img class="logo-footer" src="../img/ford-96.png" alt="Logo da Ford">
    </footer>

    <script src="../js/main.js"></script>

</body>
</html>
