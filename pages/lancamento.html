<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lançamento</title>
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/lancamento.css">
</head>

<body>
    <header>
        <img class="logo-header" src="../img/logo-ford-256.png" alt="Logo da Ford">

        <div class="hamburguer" id="btn-hamburguer">
            ☰
        </div>

        <nav class="navegacao" id="menu-nav">
            <a href="../index.html">Home</a>
            <a href="lancamento.html">Lançamento</a>
            <a href="contato.html">Contato</a>
        </nav>
    </header>
    <main>
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/vQsryuNmsL0?si=tdxSHwKTeuj2zIT2" title="YouTube video player"
                frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                referrerpolicy="strict-origin-when-cross-origin" allowfullscreen>Ford Ranger 2022 | Gerações</iframe>
        </div>

        <div class="container-cards">

            <div class="card">
                <img src="../img/XL_cabine.jpg" alt="Ford Ranger XL">
                <div class="infos">
                    <input type="checkbox">
                    <div class="textos">
                        <div class="nome-produto"><p>XL Cabine Simples 2.2 Diesel 4X4 MT 2022</p></div>
                        <p>Preço Sugerido: R$ 183.850</p>
                    </div>
                    <img src="../img/info.png" alt="Info">
                </div>
            </div>

            <div class="card">
                <img src="../img/xls_2.2_diesel.jpg" alt="Ford Ranger XLS">
                <div class="infos">
                    <input type="checkbox">
                    <div class="textos">
                        <div class="nome-produto"><p>XLS 2.2 Diesel 4X4 AT 2022</p></div>
                        <p>Preço Sugerido: R$ 220.690</p>
                    </div>
                    <img src="../img/info.png" alt="Info">
                </div>
            </div>

            <div class="card">
                <img src="../img/storm.jpg" alt="Ford Ranger Storm">
                <div class="infos">
                    <input type="checkbox">
                    <div class="textos">
                        <div class="nome-produto"><p>Storm 3.2 Diesel 4X4 AT 2022</p></div>
                        <p>Preço Sugerido: R$ 222.790</p>
                    </div>
                    <img src="../img/info.png" alt="Info">
                </div>
            </div>
        </div>

        <div class="btn-container">
           <button type="submit">Comparar Carros</button> 
        </div>

    </main>
    <footer>
        <div class="logo-redes-sociais">
            <p>Redes Sociais</p>
            <a href="https://www.facebook.com/FordBrasil/?locale=pt_BR">
                <img src="../img/facebook-50.png" alt="Facebook">
            </a>
            <a href="https://www.youtube.com/@fordbrasil/featured">
                <img src="../img/youtube-squared-50.png" alt="Youtube">
            </a>
            <a href="https://www.instagram.com/fordbrasil/">
                <img src="../img/instagram-logo-50.png" alt="Instagram">
            </a>
        </div>

        <p class="copyright">© 2022 Ford Motor Company - Todos os direitos reservados</p>

        <img class="logo-footer" src="../img/ford-96.png" alt="Logo da Ford">
    </footer>

<script src="../js/main.js"></script>

</body>

</html>
